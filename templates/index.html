<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />

<!-- 📱 FIX MOBILE SCALE + BLOCK ZOOM -->
<meta name="viewport"
      content="width=device-width,
               initial-scale=1,
               maximum-scale=1,
               user-scalable=no,
               viewport-fit=cover">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
/* ====== GLOBAL ====== */
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f0f10;
    color: white;
    overflow: hidden;
}

/* 🚫 BLOCK GESTURE ZOOM */
html, body {
    touch-action: manipulation;
}

/* ====== APP WRAPPER ====== */
.app {
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* ====== TOP TABS ====== */
.tabs {
    display: flex;
    justify-content: space-around;
    background: #1a1a1c;
    padding: 10px 5px;
}

.tab {
    font-size: 14px;
    opacity: 0.6;
    cursor: pointer;
    padding: 8px;
}

.tab.active {
    opacity: 1;
    border-bottom: 2px solid #4c8bf5;
}

/* ====== CONTENT ====== */
.content {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
}

/* ====== CARDS ====== */
.card {
    background: #1b1b1d;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 10px;
}

/* ====== INPUT ====== */
input, button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 10px;
    border: none;
}

button {
    background: #4c8bf5;
    color: white;
}
</style>
</head>

<body>

<div class="app">

    <!-- TABS -->
    <div class="tabs">
        <div class="tab active" onclick="openTab('search')">Поиск</div>
        <div class="tab" onclick="openTab('filters')">Фильтры</div>
        <div class="tab" onclick="openTab('add')">Добавить</div>
        <div class="tab" onclick="openTab('stats')">Аналитика</div>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <!-- SEARCH -->
        <div id="search" class="section">
            <h3>Поиск</h3>
            <input id="query" placeholder="BMW, Audi..." />
            <button onclick="search()">Найти</button>
            <div id="results"></div>
        </div>

        <!-- FILTERS -->
        <div id="filters" class="section" style="display:none">
            <h3>Фильтры</h3>
            <div class="card">Цена: 0 - 10 000$</div>
            <div class="card">Год: 2005 - 2025</div>
            <div class="card">Пробег: до 200k</div>
        </div>

        <!-- ADD -->
        <div id="add" class="section" style="display:none">
            <h3>Добавить фильтр</h3>
            <input placeholder="например: BMW / до 5000$" />
            <button>Сохранить</button>
        </div>

        <!-- STATS -->
        <div id="stats" class="section" style="display:none">
            <h3>Аналитика</h3>
            <div class="card">Всего запросов: 124</div>
            <div class="card">Активных фильтров: 3</div>
            <div class="card">Новых объявлений: 18</div>
        </div>

    </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

/* TAB SWITCH */
function openTab(tab) {
    document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
    document.getElementById(tab).style.display = 'block';

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
}

/* SEARCH */
async function search() {
    let q = document.getElementById("query").value;

    let res = await fetch(`/api/search?q=${q}`);
    let data = await res.json();

    let container = document.getElementById("results");
    container.innerHTML = "";

    data.results.forEach(item => {
        container.innerHTML += `
            <div class="card">
                <b>${item.title}</b><br/>
                ${item.price}<br/>
                <a href="${item.link}" style="color:#4c8bf5">Открыть</a>
            </div>
        `;
    });
}
</script>

</body>
</html>
